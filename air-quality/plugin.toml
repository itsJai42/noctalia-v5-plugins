id = "noctalia/air-quality"
name = "Air Quality"
version = "2.0.0"
min_noctalia = "5.0.0"
author = "adriamartin91"
license = "MIT"
dependencies = []
tags = ["bar", "panel", "weather"]
icon = "wind"
description = "Display current air quality from Open-Meteo."

[[setting]]
key = "latitude"
type = "string"
label_key = "settings.latitude"
description_key = "settings.location_description"
default = ""

[[setting]]
key = "longitude"
type = "string"
label_key = "settings.longitude"
description_key = "settings.location_description"
default = ""

[[setting]]
key = "refresh_minutes"
type = "int"
label_key = "settings.refresh_minutes"
default = 30
min = 5
max = 120

[[service]]
id = "air-service"
entry = "service.luau"

[[widget]]
id = "air-quality"
entry = "widget.luau"

[[panel]]
id = "air-panel"
entry = "panel.luau"
width = 420
height = 440
placement = "attached"
position = "auto"
