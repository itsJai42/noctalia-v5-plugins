id = "noctalia/giphy-search"
name = "Giphy Search"
version = "2.0.0"
min_noctalia = "5.0.0"
author = "Sergio Mendolia"
license = "MIT"
dependencies = []
tags = ["launcher", "fun"]
icon = "gif"
description = "Search Giphy from the launcher and copy GIF URLs."

[[launcher_provider]]
id = "giphy"
entry = "giphy.luau"
prefix = "/gif"
glyph = "gif"
include_in_global_search = false
debounce_ms = 300

  [[launcher_provider.setting]]
  key = "api_key"
  type = "string"
  label_key = "settings.api_key"
  description_key = "settings.api_key_description"
  default = ""

  [[launcher_provider.setting]]
  key = "rating"
  type = "select"
  label_key = "settings.rating"
  default = "g"
  options = [
    { value = "g", label_key = "settings.ratings.g" },
    { value = "pg", label_key = "settings.ratings.pg" },
    { value = "pg-13", label_key = "settings.ratings.pg13" },
    { value = "r", label_key = "settings.ratings.r" },
  ]
