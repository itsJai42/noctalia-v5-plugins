id = "noctalia/model-usage"
name = "Model Usage"
version = "1.0.0"
min_noctalia = "5.0.0"
author = "cmptr"
license = "MIT"
dependencies = ["jq"]
tags = ["bar", "ai", "productivity"]
icon = "chart-bar"
description = "Show local Claude Code or Codex session statistics."

[[setting]]
key = "provider"
type = "select"
label_key = "settings.provider"
default = "claude"
options = [
  { value = "claude", label_key = "settings.providers.claude" },
  { value = "codex", label_key = "settings.providers.codex" },
]

[[setting]]
key = "refresh_seconds"
type = "int"
label_key = "settings.refresh_seconds"
default = 30
min = 10
max = 3600

[[service]]
id = "usage-service"
entry = "service.luau"

[[widget]]
id = "usage"
entry = "widget.luau"

[[panel]]
id = "usage-panel"
entry = "panel.luau"
width = 420
height = 300
placement = "attached"
position = "auto"
