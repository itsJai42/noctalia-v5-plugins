id = "noctalia/obs-control"
name = "OBS Control"
version = "2.0.0"
min_noctalia = "5.0.0"
author = "Noctalia Community"
license = "MIT"
dependencies = ["obs-cmd"]
tags = ["bar", "recording"]
icon = "video"
description = "Control OBS recording, streaming, and replay through obs-cmd."

[[setting]]
key = "websocket_url"
type = "string"
label_key = "settings.websocket_url"
description_key = "settings.websocket_url_description"
default = ""

[[widget]]
id = "obs"
entry = "widget.luau"

[[panel]]
id = "obs-panel"
entry = "panel.luau"
width = 440
height = 340
placement = "attached"
position = "auto"

[[shortcut]]
id = "recording"
entry = "shortcut.luau"
