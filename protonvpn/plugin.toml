id = "noctalia/protonvpn"
name = "ProtonVPN Status"
version = "2.0.0"
min_noctalia = "5.0.0"
author = "blessonmathewsam"
license = "MIT"
dependencies = ["protonvpn"]
tags = ["bar", "network", "privacy"]
icon = "shield-lock"
description = "Show and control ProtonVPN from the bar."

[[setting]]
key = "poll_seconds"
type = "int"
label_key = "settings.poll_seconds"
default = 5
min = 2
max = 300

[[service]]
id = "proton-service"
entry = "service.luau"

[[widget]]
id = "protonvpn"
entry = "widget.luau"

[[panel]]
id = "proton-panel"
entry = "panel.luau"
width = 440
height = 360
placement = "attached"
position = "auto"
