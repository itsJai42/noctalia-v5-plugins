id = "noctalia/wallcards"
name = "Wallcards"
version = "1.0.0"
min_noctalia = "5.0.0"
author = "tonigineer"
license = "MIT"
dependencies = []
tags = ["wallpaper", "panel"]
icon = "photo"
description = "Browse local image wallpapers and apply them."

[[setting]]
key = "wallpaper_directory"
type = "folder"
label_key = "settings.wallpaper_directory"
description_key = "settings.wallpaper_directory_description"
default = ""

[[widget]]
id = "wallcards"
entry = "widget.luau"

[[panel]]
id = "wallcards-panel"
entry = "panel.luau"
width = 920
height = 720
placement = "floating"
position = "center"
